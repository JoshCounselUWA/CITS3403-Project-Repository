<!--

This page will be the standard home page containing a users outgoing loans, (themes, behaviours) and will be seen by ALL groups

This page will have different content depending on who logs in, eg: different "users" will only have their own loans, 
"businessAdmin" users will have all loans, and "departmentHead" users will have all of their department's loans...

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../Static/output.css">
    <script src="../Static/script.js" defer></script>

</head>
<body>
    <!-- Header -->
    <div class="fixed top-0 right-0 left-0 z-40 flex h-16 items-center gap-4 bg-sky-950 p-3 text-white">
        <img src="../Static/DICE.png" alt="Digital Inventory Control Environment" class="logo h-20">
        <h1 class="font-bold">Dashboard</h1>
    </div>
    
    <!-- Sidebar -->
    <div class="fixed top-16 bottom-0 left-0 flex w-64 flex-col gap-4 bg-slate-900 p-6 text-white">
        <button onclick="window.location.href='dashboard'" class="w-50 cursor-pointer rounded-lg bg-sky-900 py-2 hover:bg-blue-800">Dashboard</button>
        <button onclick="window.location.href='requests'" class="w-50 cursor-pointer rounded-lg bg-sky-900 py-2 hover:bg-blue-800" style="top: 180px;">Requests</button>
        <button onclick="window.location.href='inventory'" class="w-50 cursor-pointer rounded-lg bg-sky-900 py-2 hover:bg-blue-800" style="top: 260px;">Inventory</button>
    </div>
    
    <!-- Main Content -->
     <div class="fixed top-16 bottom-0 left-64 right-0 flex justify-center items-center">
        <div>
                <h2 class="text-2xl font-bold p-2 text-white">Welcome to your Dashboard</h2>
                <p class="text-white">Here you can view your current loans and requests.</p>
        </div>
     </div>

</body>
</html>
