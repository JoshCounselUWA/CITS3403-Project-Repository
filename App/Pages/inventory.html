<!--

This page will be for listing inventory items and will be seen by ALL groups

"user" group will only be able to view inventory and request items in loans, "businessAdmin" and "departmentHead" will be able to add/remove items

Could add a function to export entire inventory as a csv...

Also Connection for google calendar API to add loan return dates to calendar...

-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory</title>

    <link rel="stylesheet" href="../Static/output.css">
    <script src="../Static/script.js" defer></script>

</head>
<body>
    <div class="fixed top-0 right-0 left-0 z-40 flex h-16 items-center gap-4 bg-sky-950 p-3 text-white"><img src="../Static/DICE.png" alt="Digital Inventory Control Environment" class="logo h-20"><h1 class="font-bold">Inventory</h1></div>
    <div class="fixed top-16 bottom-0 left-0 flex w-64 flex-col gap-4 bg-slate-900 p-6 text-white">

    <button onclick="window.location.href='dashboard'" class="w-50 cursor-pointer rounded-lg bg-sky-900 py-2 hover:bg-blue-800">Dashboard</button>
    <button onclick="window.location.href='requests'" class="w-50 cursor-pointer rounded-lg bg-sky-900 py-2 hover:bg-blue-800" style="top: 180px;">Requests</button>
    <button onclick="window.location.href='inventory'" class="w-50 cursor-pointer rounded-lg bg-sky-900 py-2 hover:bg-blue-800" style="top: 260px;">Inventory</button>


    <form action="/inventory/add" method="POST" class="mb-4">
        <input name="itemName" placeholder="Item Name" required>
        <input name="itemDescription" placeholder="Description">
        <input name="itemquantity" type="number" placeholder="Quantity" required>
        <input name="itemphoto" placeholder="Photo URL">

        <button type="submit">Add Item</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>
                    Item
                </th>
                <th>
                    Category
                </th>
                <th>
                    Quantity
                </th>
                <th>
                    Status
                </th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.itemName }}</td>
                <td>{{ item.itemDescription }}</td>
                <td>{{ item.itemquantity }}</td>
                <td>
                    {% if item.itemquantity > 0 %}
                        In Stock
                    {% else %}
                        Out of Stock
                    {% endif %}
                </td>
                <td>
                    <a href="/inventory/delete/{{ item.itemID }}">
                        <button>Delete</button>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
